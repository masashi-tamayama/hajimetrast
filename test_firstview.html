<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大枠縮小テスト - シンプル版</title>
    <link rel="stylesheet" href="test_firstview.css">
</head>
<body>
    <!-- ヘッダー -->
    <header class="test-header">
        <div class="test-header-inner">
            <div class="test-logo">ロゴ</div>
            <nav class="test-nav">
                <a href="#" class="test-nav-link">選ばれる理由</a>
                <a href="#" class="test-nav-link">買取事例</a>
                <a href="#" class="test-nav-link">ご利用の流れ</a>
                <a href="#" class="test-nav-link">対応エリア</a>
            </nav>
            <div class="test-header-cta">
                <div class="test-tel">0120-50-4891</div>
            </div>
        </div>
    </header>
    
    <section class="test-mv">
        <div class="test-mv-inner">
            <p class="test-text">テキストサンプル</p>
        </div>
    </section>
    
    <div class="test-info">
        <p>画面幅: <span id="screenWidth"></span>px</p>
        <p>大枠（青い背景）が自然に縮小するか確認</p>
    </div>
    
    <script>
        function updateWidth() {
            document.getElementById('screenWidth').textContent = window.innerWidth;
        }
        window.addEventListener('resize', updateWidth);
        updateWidth();
    </script>
</body>
</html>
